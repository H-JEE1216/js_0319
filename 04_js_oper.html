<!DOCTYPE html>
<html lang="ko">

    <head>

        <script>
            let gender = prompt ("당신의 성별은?")  
            let age = prompt ( "당신의 나이는?" )
 
            // 입력상자에서 받는 모든 값들은 문자열로 값이 저장 된다
            // 같은 20의 값을 입력하더라도 '==='로 비교할 경우 false를 반환한다
            // document.write( age === 20 )

            // Number() : 실제 정수형태로 비교해야 하는 상황에서 사용하는 함수
            let res = Number(age) >= 20 && age <= 30 && gender === '남자'
            document.write( res )
        </script>

    </head>

    <body>
        
    </body>
</html>
