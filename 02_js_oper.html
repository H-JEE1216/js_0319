<!DOCTYPE html>
<html>

    <head>
        <script>
            let a = 10;
            let b = 3;
            let result = a + b;
            document.write( result + "<br/>" );

            result = a / b; 
            // .toFixed() : 원하는 자릿수까지 소수점을 끊어서주는 메서드
            document.write( result.toFixed(2) + "<br/>" );

            // 문자열과 숫자를 구별하지xx "10"과 10을 같다고 본다
            // == : 타입 구별없이 값이 같은지 판단
            let num1 = 10;
            let num2 = "10";
            result = num1 == num2;
            document.write( result, '<br/>' );

            // '='을 3개 사용하여 구별하면 "10"과 10을 구별한다.
            // === : 타입까지 구별해서 값이 같은지 판단
            result = num1 === num2;
            document.write( result, '<br/>' )

        </script>
    </head>

    <body>
        
    </body>

</html>
