<!DOCTYPE html>
<html lang="ko">

    <head>
        <script>
            let dan = Number(prompt( "출력할 단" ))

            for( let i = 1; i < 10; i++ ){   
 
                document.write( dan + " * " + i + "=" + dan*i+"<br/>")

            }

            document.write("<hr/>")
            
            document.write( "<ul>")
            for( let i = 1; i <= dan; i++ ){
                document.write( "<li>메뉴" + i + "</li>" )
             }
            document.write( "</ul>")
        </script>
    </head>

    <body></body>
</html>
