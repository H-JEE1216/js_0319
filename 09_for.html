<!DOCTYPE html>
<html lang="ko">

    <head>
        <script>
            let dan = Number(prompt( "출력할 단" ))

            for( let i = 1; i < 10; i++ ){   
 
                document.write( dan + " * " + i + "=" + dan*i+"<br/>")

            }
        </script>
    </head>

    <body></body>
</html>
