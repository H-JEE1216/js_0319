<!DOCTYPE html>
<html lang="ko">

    <head>
        <script>
            document.write("자바스크립트 시작");

            document.write("<br/>");

            //**자바스크립트의 자료형
            //var : 중복된 변수명을 허용(많이 사용하지 않음)
            //let : 중복된 변수명을 허용하지 않는다(가장 많이 사용)
            //const : 자바의 상수 개념으로 한 번 넣은 값에 대해서는 변경이 불가능하다!

            let str = '문자열';
            str = '변경';

            document.write( str + '<br/>' );

            const number = 100;
            //number = 150;

            let value = 100;
            value = true;

            let value2 = 3.14;

            // +대신 ,로 변수를 이어붙일 수 있다
            document.write( value , "&nbsp;&nbsp;" ,  value2 );

            //이제부터 js를 시작해요

        </script>
    </head>

</html>
