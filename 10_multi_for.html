<!DOCTYPE html>
<html lang="ko">

    <head>
        <script>
            document.write( '<table border="1">' )
                document.write( '<tr>' )
                    for( let i = 2; i < 10; i++ ){
                    document.write( '<th>' + i + "단</th>" )
                    }
                document.write( '</tr>' )

                document.write( '<tr>' )
                    for( let i = 1; i < 9; i++ ){
                        document.write( '<tr>' )
                            for( let j = 2; j <= 9; j++ ){
                                document.write(
                                    '<td>' + j + " * " + i + ' = ' + (i*j) + '</td>')
                            }
                        document.write( '<tr>' )
                    }//outer
                document.write( '</tr>' )

                
            document.write( '</table>' )
        </script>
    </head>    

    <body></body>

</html>
